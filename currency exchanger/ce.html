<!doctype html>
<html>
  <head>
    <title>Currencyexchanger</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width initial-scale 1.0" />
    <link rel="stylesheet" href="ce.css" />
  </head>
  <body>
    <div id="container">
      <h2>CURRENCY EXCHANGER</h2>
      <label>Select source currency</label>
      <select id="from"></select>
      <input type="number" id="amount" placeholder="Enter amount to convert" />
      <br /><br /><br />
      <label>Select target currency</label>
      <select id="to"></select>
      <p class="msg"></p>
      <br /><br />
      <button id="cnvrt">CONVERT</button>
      <h3 id="result"></h3>
    </div>
    <script src="ce.js"></script>
  </body>
</html>
