<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta view="viewport" content=" width= device-width initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="IE-edge">
        <title>colour changer</title>

        <style>
            .red{ padding: 50px;
                margin-left: 400px;
                background-color: red;
                cursor: pointer;
                 }
            .blue{ padding: 50px;
                margin-left: 0px;
                background-color: rgb(21, 0, 255);
                cursor: pointer;
                 }
            .green{ padding: 50px;
                margin-left: 0px;
                background-color: rgb(7, 143, 57);
                cursor: pointer;
                 }
            .yellow{ padding: 50px;
                margin-left: 0px;
                background-color: rgb(251, 255, 0);
                cursor: pointer;
                
                 }
            
        </style>

    </head> 
    <body>
        <button id="redb" class="red">red</button>
        <button id="blueb" class="blue">blue</button>
        <button id="greenb" class="green">green</button>
        <button id="yellowb" class="yellow">yellow</button>
        
    </body>
    <script>
        const bred = document.getElementById('redb')
        bred.addEventListener('click',function(){
            document.body.style.backgroundColor = "red";
            
        });

        const bblue = document.getElementById('blueb')
        bblue.addEventListener('click', function(){
            document.body.style.backgroundColor = "blue";
        });


        const bgreen = document.getElementById('greenb')  
        bgreen.addEventListener('click',function(){
            document.body.style.backgroundColor="green";
        });


            const byellow = document.getElementById('yellowb')  
        byellow.addEventListener('click',function(){
            document.body.style.backgroundColor="yellow";
        });
        
    </script>
</html>
