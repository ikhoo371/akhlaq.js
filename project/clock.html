<DOCTYPE! html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta view="viewport" content="width=device-width initial-scale 1.0">
    <style>
        .clock{

            padding: 10px;
            border-radius: 20px;
            background-color: black;
            color: aliceblue;
 

        }
        
    </style>    
    </head>
<body>
    <button id="time" class="clock"></button>
</body>  
<script>
    const clck = document.getElementById('time')
    setInterval(function(){
        let date = new Date();
        clck.innerHTML = date.toLocaleTimeString();
    }, 1000);
</script> 
</html>
